# 机场订阅
pp: &pp {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300}, header: {User-Agent: ["Clash/v1.18.0", "mihomo/1.19.21"]}, override: {client-fingerprint: chrome}}
proxy-providers:
  Mitce:
    url: "https://app.mitce.net/?sid=565383&token=srvszeee"
    <<: *pp
# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
keep-alive-idle: 60
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
# 入站  
tun:
  enable: true
  stack: mixed # system/gvisor/mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.googlevideo.com"
    - "+.returnyoutubedislikeapi.com"
    - "+.subhd.me"
    - "+.yysub.net"
    - "+.uupdump.net"
    - "+.torrentgalaxy.one"
    - "+.torrentdownloads.pro"
    - rule-set:google-play_domain
    - rule-set:cn_domain
    - rule-set:private_domain
    - rule-set:category-ai-!cn_domain
    - rule-set:category-ai-cn_domain
    - rule-set:fakeipfilter_domain
  nameserver:
    - 223.5.5.5
    - 223.6.6.6
  proxy-server-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver-policy:
    "rule-set:google-play_domain,youtube_domain,google_domain":
      - 'https://1.1.1.1/dns-query#Auto'
      - 'https://1.0.0.1/dns-query#Auto'
    "rule-set:douyin_domain":
      - 180.184.1.1
      - 180.184.2.2
    "rule-set:tencent_domain":
      - 119.29.29.29
      - 182.254.116.116
    "rule-set:category-ai-!cn_domain,github_domain,microsoft_domain,netflix_domain,tiktok_domain,reddit_domain,category-porn_domain,gfw_domain,geolocation-!cn":
      - 'https://1.1.1.1/dns-query#Auto'
      - 'https://1.0.0.1/dns-query#Auto'
    "+.returnyoutubedislikeapi.com,+.redgifsdownloader.net,+.redgifsdownloader.org": ['https://1.1.1.1/dns-query#Auto', 'https://1.0.0.1/dns-query#Auto']
# 出站策略
pg: &pg {type: url-test, include-all: true, health-check: true, url: "https://www.gstatic.com/generate_204", interval: 300, tolerance: 20}
proxy-groups:
  - {name: Auto, <<: *pg}
  - {name: HY2, <<: *pg, filter: "(?i)HY2"}
  - {name: YouTube, type: fallback, proxies: [🇯🇵 Japan, 🇭🇰 HongKong, Auto], icon: "https://raw.githubusercontent.com/raivo-otp/issuer-icons/refs/heads/master/vectors/youtube.com/youtube.svg"}
  - {name: Gemini, <<: *pg, filter: "(?i)gemini", icon: "https://raw.githubusercontent.com/raivo-otp/issuer-icons/refs/heads/master/vectors/google.com/google.svg"}
  - {name: 🇭🇰 HongKong, <<: *pg, filter: "(?i)港|hk|hongkong|hong kong"}
  - {name: 🇹🇼 Taiwan, <<: *pg, filter: "(?i)台|TW|Taiwan"}
  - {name: 🇯🇵 Japan, <<: *pg, filter: "(?i)日|jp|japan|Tokyo"}
  - {name: 🇰🇷 Korea, <<: *pg, filter: "(?i)韩|KR|Korea|Incheon"}
  - {name: 🇸🇬 Singapore, <<: *pg, filter: "(?i)新|狮|SG|Singapore"}
  - {name: 🇺🇸 USA, <<: *pg, filter: "(?i)美|us|unitedstates|united states|California"}
# 规则匹配
rules:
  - DOMAIN-SUFFIX,googlevideo.com,YouTube
  - DOMAIN-SUFFIX,gemini.google.com,YouTube
  - DOMAIN-SUFFIX,media.redgifs.com,YouTube
  - DOMAIN-SUFFIX,returnyoutubedislikeapi.com,DIRECT
  - DOMAIN-SUFFIX,seaspirit.dpdns.org,DIRECT
  - DOMAIN-SUFFIX,subhd.me,DIRECT
  - DOMAIN-SUFFIX,uupdump.net,DIRECT
  - DOMAIN-SUFFIX,downloadtorrentfile.com,DIRECT
  - DOMAIN-SUFFIX,qnap.com,DIRECT
  - DOMAIN-SUFFIX,softonic.cn,Auto
  - RULE-SET,google@ads_domain,REJECT-DROP
  - RULE-SET,google-play_domain,🇺🇸 USA
  - RULE-SET,youtube_domain,🇺🇸 USA
  - RULE-SET,google_domain,🇺🇸 USA
  - RULE-SET,cloudflare_domain,DIRECT
  - RULE-SET,bytedance@ads_domain,REJECT-DROP
  - RULE-SET,douyin_domain,DIRECT
  - RULE-SET,tiktok_domain,Auto
  - RULE-SET,115_domain,DIRECT
  - RULE-SET,github_domain,Auto
  - RULE-SET,category-ai-!cn@ads_domain,REJECT-DROP
  - RULE-SET,category-ai-!cn_domain,Auto
  - RULE-SET,category-ai-cn_domain,DIRECT
  - RULE-SET,microsoft@ads_domain,REJECT-DROP
  - RULE-SET,microsoft_domain,Auto
  - RULE-SET,apple@ads_domain,REJECT-DROP
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,huawei_domain,DIRECT
  - RULE-SET,alibaba@ads_domain,REJECT-DROP
  - RULE-SET,alibaba_domain,DIRECT
  - RULE-SET,tencent@ads_domain,REJECT-DROP
  - RULE-SET,tencent_domain,DIRECT
  - RULE-SET,baidu@ads_domain,REJECT-DROP
  - RULE-SET,baidu_domain,DIRECT
  - RULE-SET,netflix_domain,Auto
  - RULE-SET,disney_domain,Auto
  - RULE-SET,telegram_domain,Auto
  - RULE-SET,speedtest_domain,Auto
  - RULE-SET,paypal_domain,Auto
  - RULE-SET,test-ipv6_domain,DIRECT
  - RULE-SET,reddit_domain,Auto
  - RULE-SET,category-porn@ads_domain,REJECT-DROP
  - RULE-SET,category-porn_domain,Auto
  - RULE-SET,gfw_domain,Auto
  - RULE-SET,geolocation-!cn,Auto
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,google_ip,Auto,no-resolve
  - RULE-SET,cloudflare_ip,DIRECT,no-resolve
  - RULE-SET,netflix_ip,Auto,no-resolve
  - RULE-SET,telegram_ip,Auto,no-resolve
  - RULE-SET,cn_ip,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - MATCH,Auto
# 规则集
