# 机场订阅
pp: &pp {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 120}, header: {User-Agent: ["Clash/v1.18.0", "mihomo/1.19.24"]}, override: {client-fingerprint: chrome}}
proxy-providers:
  BPB:
    url: "https://bpb.seaspirit.dpdns.org/sub/normal/de5eb6ed-ceee-4de9-b5a5-7ee799dc99aa?app=clash#%F0%9F%92%A6%20BPB%20Normal"
    <<: *pp
  Joey:
    url: "https://j.seaspirit.dpdns.org/j/sub"
    <<: *pp
# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
keep-alive-idle: 60
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
#自定义 geodata url
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
geo-auto-update: true # 是否自动更新 geodata
geo-update-interval: 72 # 更新间隔，单位：小时
# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
# 入站  
tun:
  enable: true
  stack: mixed # system/gvisor/mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  listen: 0.0.0.0:1053
  ipv6: true
  ipv6-timeout: 300
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-ttl: 600
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.returnyoutubedislikeapi.com"
    - "+.subhd.me"
    - "+.yysub.net"
    - "+.uupdump.net"
    - "+.torrentgalaxy.one"
    - "+.torrentdownloads.pro"
    - "+.maxjav.com"
    - rule-set:google-play_domain
    - rule-set:x_domain
    - rule-set:cn_domain
    - rule-set:private_domain
    - rule-set:fakeipfilter_domain
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query#Auto&ecs=223.5.5.0/24
    - https://dns.google/dns-query#ecs=223.5.5.0/24
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4   # 保留地址（污染常见）
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "rule-set:category-ads-all_domain": rcode://success
    "rule-set:youtube_domain,google-play_domain,google-gemini_domain,google_domain":
      - https://dns.google/dns-query#ecs=223.5.5.0/24
      - https://cloudflare-dns.com/dns-query#Auto&ecs=223.5.5.0/24
    "rule-set:douyin_domain":
      - 180.184.1.1
      - 180.184.2.2
    "rule-set:tencent_domain":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "rule-set:cloudflare@cn_domain,cloudflare_domain,cn_domain,private_domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:github_domain,category-ai-!cn_domain,win-update_domain,geolocation-!cn":
      - https://cloudflare-dns.com/dns-query#Auto&ecs=223.5.5.0/24
      - https://dns.google/dns-query#ecs=223.5.5.0/24
# 出站策略
pg: &pg {type: url-test, health-check: true, url: "https://www.gstatic.com/generate_204", interval: 120, tolerance: 0}
proxy-groups:
  - name: "Auto"
    use:
      - BPB
    <<: *pg
  - name: "Joey"
    use:
      - Joey
    <<: *pg
# 规则匹配
rules:
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((RULE-SET,cn_domain)))),REJECT-DROP
  - DOMAIN-SUFFIX,media.redgifs.com,Joey
  - DOMAIN-SUFFIX,returnyoutubedislikeapi.com,DIRECT
  - DOMAIN-SUFFIX,subhd.me,DIRECT
  - DOMAIN-SUFFIX,uupdump.net,DIRECT
  - DOMAIN-SUFFIX,downloadtorrentfile.com,DIRECT
  - DOMAIN-SUFFIX,qnap.com,DIRECT
  - DOMAIN-SUFFIX,softonic.cn,Auto
  - DOMAIN-SUFFIX,bt4gprx.com,Joey
  - RULE-SET,google@ads_domain,REJECT-DROP
  - RULE-SET,google-play_domain,Joey
  - RULE-SET,youtube_domain,Joey
  - RULE-SET,google-gemini_domain,Auto
  - RULE-SET,google_domain,Joey
  - RULE-SET,cloudflare@cn_domain,DIRECT
  - RULE-SET,cloudflare_domain,DIRECT
  - RULE-SET,bytedance@ads_domain,REJECT-DROP
  - RULE-SET,douyin_domain,DIRECT
  - RULE-SET,tiktok_domain,Auto
  - RULE-SET,bytedance@!cn_domain,Auto
  - RULE-SET,bytedance_domain,DIRECT
  - RULE-SET,115_domain,DIRECT
  - RULE-SET,github_domain,Auto
  - RULE-SET,category-ai-!cn@ads_domain,REJECT-DROP
  - RULE-SET,openai_domain,Auto
  - RULE-SET,x@ads_domain,REJECT-DROP
  - RULE-SET,x_domain,Joey
  - RULE-SET,category-ai-!cn_domain,Auto
  - RULE-SET,category-ai-cn_domain,DIRECT
  - RULE-SET,microsoft@ads_domain,REJECT-DROP
  - RULE-SET,win-update_domain,Joey
  - RULE-SET,microsoft@cn_domain,DIRECT
  - RULE-SET,microsoft_domain,Auto
  - RULE-SET,apple@ads_domain,REJECT-DROP
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,huawei_domain,DIRECT
  - RULE-SET,alibaba@ads_domain,REJECT-DROP
  - RULE-SET,alibaba_domain,DIRECT
  - RULE-SET,tencent@ads_domain,REJECT-DROP
  - RULE-SET,tencent_domain,DIRECT
  - RULE-SET,baidu@ads_domain,REJECT-DROP
  - RULE-SET,baidu_domain,DIRECT
  - RULE-SET,netflix_domain,Auto
  - RULE-SET,disney_domain,Auto
  - RULE-SET,telegram_domain,Auto
  - RULE-SET,speedtest_domain,Auto
  - RULE-SET,paypal_domain,Auto
  - RULE-SET,test-ipv6_domain,DIRECT
  - RULE-SET,reddit_domain,Auto
  - RULE-SET,category-porn@ads_domain,REJECT-DROP
  - RULE-SET,category-porn_domain,Auto
  - RULE-SET,gfw_domain,Auto
  - RULE-SET,geolocation-!cn,Auto
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,google_ip,Auto,no-resolve
  - RULE-SET,cloudflare_ip,DIRECT,no-resolve
  - RULE-SET,netflix_ip,Auto,no-resolve
  - RULE-SET,telegram_ip,Auto,no-resolve
  - RULE-SET,apple_ip,DIRECT
  - RULE-SET,cn_ip,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - MATCH,Auto
